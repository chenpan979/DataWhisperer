services:
  mysql:
    image: mysql:8.4
    container_name: datawhisperer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: datawhisperer_demo
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ./scripts/mysql_sample.sql:/docker-entrypoint-initdb.d/01_mysql_sample.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
