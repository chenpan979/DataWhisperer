<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataWhisperer Console</title>
    <link rel="stylesheet" href="/static/assets/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script defer src="/static/assets/app.js"></script>
  </head>
  <body>
    <svg aria-hidden="true" class="icon-sprite">
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m22 2-7 20-4-9-9-4Z"></path>
        <path d="M22 2 11 13"></path>
      </symbol>
      <symbol id="icon-database" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
        <path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5"></path>
        <path d="M3 12c0 1.7 4 3 9 3s9-1.3 9-3"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15.5 6.2"></path>
        <path d="M3 12A9 9 0 0 1 18.5 5.8"></path>
        <path d="M18 3v4h4"></path>
        <path d="M6 21v-4H2"></path>
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="M20 6 9 17l-5-5"></path>
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">DW</div>
          <div>
            <h1>DataWhisperer</h1>
            <p>自然语言数据分析工作台</p>
          </div>
        </div>
        <div class="topbar-actions">
          <span class="status-pill" id="healthStatus">检查服务中</span>
          <a class="nav-link" href="/docs" target="_blank" rel="noreferrer">接口文档</a>
        </div>
      </header>

      <main class="workspace">
        <aside class="query-panel" aria-label="查询工作区">
          <section class="panel">
            <div class="panel-heading">
              <div>
                <h2>数据问题</h2>
                <p>连接示例 MySQL 库</p>
              </div>
              <button class="icon-button" id="refreshExamplesButton" type="button" title="刷新示例">
                <svg><use href="#icon-refresh"></use></svg>
              </button>
            </div>

            <label class="field-label" for="questionInput">问题</label>
            <textarea
              id="questionInput"
              rows="7"
              spellcheck="false"
              placeholder="例如：查询各地区订单数量"
            ></textarea>

            <div class="control-row">
              <label class="field-label compact" for="maxRowsInput">行数</label>
              <input id="maxRowsInput" type="number" min="1" max="500" value="100" />
              <button class="primary-button" id="runButton" type="button">
                <svg><use href="#icon-send"></use></svg>
                <span>运行分析</span>
              </button>
            </div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <h2>示例问题</h2>
                <p>来自 /api/examples</p>
              </div>
            </div>
            <div class="example-list" id="exampleList"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <div>
                <h2>数据结构</h2>
                <p>表与字段概览</p>
              </div>
              <button class="secondary-button" id="loadSchemaButton" type="button">
                <svg><use href="#icon-database"></use></svg>
                <span>读取</span>
              </button>
            </div>
            <div class="schema-box" id="schemaBox">未加载</div>
          </section>
        </aside>

        <section class="result-area" aria-label="分析结果">
          <div class="summary-band">
            <div class="metric">
              <span>结果行数</span>
              <strong id="metricRows">0</strong>
            </div>
            <div class="metric">
              <span>字段数量</span>
              <strong id="metricColumns">0</strong>
            </div>
            <div class="metric">
              <span>图表类型</span>
              <strong id="metricChart">-</strong>
            </div>
            <div class="metric">
              <span>执行步骤</span>
              <strong id="metricTrace">0</strong>
            </div>
          </div>

          <section class="panel insight-panel">
            <div class="panel-heading">
              <div>
                <h2>分析结论</h2>
                <p id="activeQuestion">等待问题输入</p>
              </div>
              <span class="state-label" id="runState">空闲</span>
            </div>
            <p class="insight-text" id="insightText">运行一次分析后，这里会显示基于查询结果生成的业务结论。</p>
            <div class="warning-list" id="warningList"></div>
          </section>

          <section class="panel">
            <div class="tabs" role="tablist" aria-label="结果视图">
              <button class="tab active" data-tab="chart" type="button">图表</button>
              <button class="tab" data-tab="table" type="button">表格</button>
              <button class="tab" data-tab="sql" type="button">SQL</button>
              <button class="tab" data-tab="trace" type="button">轨迹</button>
            </div>

            <div class="tab-panel active" id="chartPanel">
              <div class="chart-host empty-chart" id="chartHost">
                <div class="empty-state">暂无图表</div>
              </div>
            </div>

            <div class="tab-panel" id="tablePanel">
              <div class="table-wrap">
                <table id="resultTable">
                  <thead></thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>

            <div class="tab-panel" id="sqlPanel">
              <div class="code-toolbar">
                <span>执行 SQL</span>
                <button class="icon-button" id="copySqlButton" type="button" title="复制 SQL">
                  <svg><use href="#icon-copy"></use></svg>
                </button>
              </div>
              <pre class="sql-block" id="sqlBlock">-- SQL will appear here</pre>
            </div>

            <div class="tab-panel" id="tracePanel">
              <ol class="trace-list" id="traceList"></ol>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
